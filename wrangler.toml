name = "cf-poll"
main = "src/worker.ts"
compatibility_date = "2025-06-08"
compatibility_flags = ["nodejs_compat"]

# Static assets configuration
[assets]
directory = "./dist"
binding = "ASSETS"
# SPA fallback - serve index.html for all frontend routes
not_found_handling = "single-page-application"

[durable_objects]
bindings = [
  { name = "pollroom", class_name = "PollRoom" }
]

[[migrations]]
tag = "v1"
# SQLite requires new_sqlite_classes, not new_classes
new_sqlite_classes = ["PollRoom"]
